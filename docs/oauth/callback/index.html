<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Loot de Ofertas — Autorização</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f4f7fb; color: #0b2d5c; }
    main { width: min(560px, calc(100% - 40px)); padding: 32px; border-radius: 20px; background: white; box-shadow: 0 16px 45px #0b2d5c1f; }
    h1 { margin-top: 0; }
    code { display: block; overflow-wrap: anywhere; padding: 14px; border-radius: 10px; background: #edf4ff; }
    button { margin-top: 16px; padding: 12px 18px; border: 0; border-radius: 10px; background: #0866ff; color: white; font-weight: 700; cursor: pointer; }
    .error { color: #a21b1b; }
  </style>
</head>
<body>
  <main>
    <h1>Loot de Ofertas</h1>
    <p id="status">Verificando o retorno da autorização…</p>
    <code id="code" hidden></code>
    <button id="copy" type="button" hidden>Copiar código</button>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get('code');
    const error = params.get('error');
    const status = document.querySelector('#status');
    const output = document.querySelector('#code');
    const copy = document.querySelector('#copy');

    if (code) {
      status.textContent = 'Autorização recebida. Copie o código para concluir a conexão no aplicativo.';
      output.textContent = code;
      output.hidden = false;
      copy.hidden = false;
      copy.addEventListener('click', async () => {
        await navigator.clipboard.writeText(code);
        copy.textContent = 'Código copiado';
      });
    } else if (error) {
      status.textContent = `A autorização não foi concluída: ${error}`;
      status.classList.add('error');
    } else {
      status.textContent = 'Página de retorno OAuth pronta.';
    }
  </script>
</body>
</html>

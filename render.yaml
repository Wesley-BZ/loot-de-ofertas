services:
  - type: web
    name: loot-de-ofertas-wesley-bz
    runtime: python
    plan: free
    buildCommand: pip install .
    startCommand: uvicorn loot_ofertas.webapp:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: WEBHOOK_DATABASE
        value: /tmp/loot-de-ofertas-webhooks.db
      - key: MELI_CLIENT_ID
        sync: false
      - key: MELI_CLIENT_SECRET
        sync: false
      - key: MELI_REDIRECT_URI
        sync: false
      - key: MELI_CALLBACK_URL
        sync: false
      - key: MELI_WEBHOOK_URL
        sync: false
      - key: MAGALU_STORE_URL
        sync: false
      - key: MAGALU_COUPONS_URL
        sync: false
      - key: MAGALU_PARTNER_ID
        value: "3440"
      - key: MAGALU_PROMOTER_ID
        value: "5774816"
      - key: MAGALU_BROWSER_HEADLESS
        value: "true"
